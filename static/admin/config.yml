# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: qaduni/qa.qu.edu.iq
  branch: main

media_folder: "static/images"
public_folder: "/images"

i18n:
  structure: multiple_files
  locales: [ar, en]
  default_locale: ar

media_libraries:
  cloudflare_r2:
    access_key_id: "GK57271827720b4796312d2735"
    bucket: "qa-qu-cms"
    account_id: "s3.garage.qu.edu.iq/?"
    prefix: "cms-uploads/"
    public_url: "https://s3.garage.qu.edu.iq/qa-qu-cms"
  
  all:
    transformations:
      raster_image:
        format: webp     # Converts images (PNG, JPG, etc.) to WebP
        quality: 85      # Optional: set WebP compression quality (default is 85)
        # width: 2048    # Optional: uncomment to set a max width 
        # height: 2048   # Optional: uncomment to set a max height
      svg:
        optimize: true

site_url: https://qa.qu.edu.iq
display_url: https://qa.qu.edu.iq

collections:
  - name: "news"
    label: "News / الأخبار"
    label_singular: "News Item / خبر"
    i18n: true
    folder: "content/media/news"
    path: "{{year}}/{{month}}/{{day}}/{{slug}}"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - {
          label: "Title / العنوان",
          name: "title",
          widget: "string",
          required: true,
          i18n: true,
        }
      - {
          label: "URL Slug / الرابط",
          name: "slug",
          widget: "string",
          i18n: duplicate,
          hint: "Lowercase ASCII — used as the URL for both AR and EN.",
        }
      - { name: "date", widget: "datetime", default: "", i18n: duplicate }
      - {
          label: "Description / الوصف",
          name: "description",
          widget: "text",
          required: true,
          i18n: true,
        }
      - {
          label: "Image / الصورة",
          name: "image",
          widget: "image",
          required: false,
          i18n: duplicate,
        }
      - {
          label: "Body / المحتوى",
          name: "body",
          widget: "markdown",
          i18n: true,
        }

  - name: "announcements"
    label: "Announcements / الإعلانات"
    label_singular: "Announcement / إعلان"
    i18n: true
    folder: "content/media/announcements"
    path: "{{year}}/{{month}}/{{day}}/{{slug}}"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - {
          label: "Title / العنوان",
          name: "title",
          widget: "string",
          required: true,
          i18n: true,
        }
      - {
          label: "URL Slug / الرابط",
          name: "slug",
          widget: "string",
          i18n: duplicate,
          hint: "Lowercase ASCII — used as the URL for both AR and EN.",
        }
      - { name: "date", widget: "datetime", default: "", i18n: duplicate }
      - {
          label: "Type / النوع",
          name: "type",
          widget: "select",
          i18n: duplicate,
          options:
            [
              { label: "إداري / Administrative", value: "Administrative" },
              { label: "أكاديمي / Academic", value: "Academic" },
              { label: "طلبة / Students", value: "Students" },
              { label: "عام / General", value: "General" },
            ],
        }
      - {
          label: "Important / مهم",
          name: "important",
          widget: "boolean",
          default: false,
          i18n: duplicate,
        }
      - {
          label: "Description / الوصف",
          name: "description",
          widget: "text",
          required: true,
          i18n: true,
        }
      - {
          label: "Body / المحتوى",
          name: "body",
          widget: "markdown",
          i18n: true,
        }
