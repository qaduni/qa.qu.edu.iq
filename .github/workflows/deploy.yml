name: Deploy to Hetzner

on:
  push:
    branches: [main]

# One deploy at a time. Don't cancel in-flight deploys — a half-applied
# release on the VPS is worse than a queued one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  HUGO_VERSION: '0.161.1'
  NODE_VERSION: '26'
  DEPLOY_BASE: /var/www/qa.qu.edu.iq
  KEEP_RELEASES: '5'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Hugo extended
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb
          hugo version | grep -q extended

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm deps (Pagefind)
        run: npm ci

      - name: Build site
        run: hugo --gc --minify --environment production

      - name: Build Pagefind index
        run: npx pagefind --site public

      # Belt-and-braces: per README, the local-dev Garage admin shim must
      # never reach production. hugo.toml already excludes it under
      # `--environment production`, this catches the case where it slips in.
      - name: Strip local-only admin tooling
        run: rm -rf public/admin/local

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Compute release id
        id: rel
        run: echo "id=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Rsync release to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          REL: ${{ steps.rel.outputs.id }}
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${SSH_PORT} -i ~/.ssh/id_deploy -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"

          ssh ${SSH_OPTS} "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p '${DEPLOY_BASE}/releases/${REL}'"

          rsync -az --delete --human-readable \
            -e "ssh ${SSH_OPTS}" \
            public/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_BASE}/releases/${REL}/"

      - name: Atomic symlink swap + prune old releases
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          REL: ${{ steps.rel.outputs.id }}
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${SSH_PORT} -i ~/.ssh/id_deploy -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"

          ssh ${SSH_OPTS} "${SSH_USER}@${SSH_HOST}" \
            DEPLOY_BASE="${DEPLOY_BASE}" REL="${REL}" KEEP="${KEEP_RELEASES}" \
            'bash -se' <<'REMOTE'
          set -euo pipefail
          cd "${DEPLOY_BASE}"

          # Two-step rename = atomic swap (rename(2) on the same filesystem
          # is atomic — Angie never sees a half-updated symlink).
          ln -sfn "releases/${REL}" current.new
          mv -Tf current.new current

          # Keep N most recent releases.
          ls -1dt releases/*/ 2>/dev/null | tail -n +"$((KEEP + 1))" | xargs -r rm -rf
          REMOTE

      - name: Smoke test
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${SSH_PORT} -i ~/.ssh/id_deploy -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"
          ssh ${SSH_OPTS} "${SSH_USER}@${SSH_HOST}" \
            "test -f '${DEPLOY_BASE}/current/index.html' && test -d '${DEPLOY_BASE}/current/pagefind'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
