server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- Compression ----------
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_proxied       any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ---------- Security headers ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---------- Long-cache: hashed assets and immutable media ----------
    # Hugo fingerprints CSS/JS; theme images/fonts rarely change.
    location ~* \.(?:css|js|mjs|woff|woff2|ttf|otf|eot|png|jpe?g|gif|webp|avif|ico|svg|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------- Short-cache: HTML and feeds ----------
    location ~* \.(?:html|xml|json|txt)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ---------- Pagefind bundles ----------
    # Pagefind ships its own .pf_meta / .pf_index files; let it serve them raw.
    location ~* /pagefind(?:-[a-z]+)?/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ---------- Clean-URL routing ----------
    # Hugo generates /about/index.html etc. Try the file, the directory, then 404.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ---------- Custom error page (Hugo emits 404.html at the root) ----------
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ---------- Don't serve dotfiles ----------
    location ~ /\.(?!well-known) {
        deny all;
    }
}
