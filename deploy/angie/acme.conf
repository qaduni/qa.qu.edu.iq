# /etc/angie/http.d/acme.conf
#
# Angie native ACME client — declares the issuer once at the http{}
# level. Server blocks bind to it with `acme letsencrypt;`.
#
# No certbot, no cron, no systemd timer: Angie renews automatically
# before `renew_before_expiry`.
#
# Requires Angie >= 1.6 (the version that ships the ACME module).

# ACME needs to resolve the directory URL. Use a public resolver unless
# you have a local one — pick whichever you trust.
resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

acme_client letsencrypt https://acme-v02.api.letsencrypt.org/directory
            email=admin@qu.edu.iq
            renew_before_expiry=30d;
