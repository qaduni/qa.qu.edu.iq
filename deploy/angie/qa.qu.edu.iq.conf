# /etc/angie/http.d/qa.qu.edu.iq.conf
#
# Hugo static site for qa.qu.edu.iq — HTTP/3 + Angie native ACME (no
# certbot). Pair with deploy/angie/acme.conf which declares the
# acme_client at the http{} level.
#
# The release symlink (DEPLOY_BASE/current) is swapped atomically by
# .github/workflows/deploy.yml — no reload needed on each deploy.

# -----------------------------------------------------------------------
# Port 80: ACME http-01 challenges + redirect to HTTPS.
#
# The `acme` directive here is what makes Angie's ACME client respond on
# /.well-known/acme-challenge/<token> for this server_name. Don't add a
# manual location for that path — Angie handles it internally.
# -----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name qa.qu.edu.iq;

    acme letsencrypt;

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------
# Port 443: HTTPS + HTTP/3 (QUIC).
# -----------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    http2 on;

    server_name qa.qu.edu.iq;

    # --- Angie native ACME (no certbot) -------------------------------
    # Certificate is issued + auto-renewed by the acme_client declared
    # in /etc/angie/http.d/acme.conf. Variables are populated from that
    # client's state path.
    acme letsencrypt;
    ssl_certificate     $acme_cert_letsencrypt;
    ssl_certificate_key $acme_cert_pkey_letsencrypt;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Tell HTTP/2 clients to upgrade to HTTP/3 on the next request.
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # Baseline security headers (the site is static — no need for CSP
    # gymnastics, but lock down the basics).
    add_header X-Content-Type-Options nosniff           always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header X-Frame-Options        SAMEORIGIN        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root  /var/www/qa.qu.edu.iq/current;
    index index.html;

    # PWA manifest MIME (README explicitly calls this out).
    types {
        application/manifest+json webmanifest;
    }

    # Content-hashed assets: long-cache + immutable (README §Deployment).
    location ~* ^/(?:fonts|css|js)/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Images: cache aggressively, but revalidate eventually.
    location ~* \.(?:webp|avif|jpe?g|png|svg|ico)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # Pagefind index: rebuilt every deploy, short cache so editors see
    # search updates fast after a CMS commit lands.
    location /pagefind/ {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # HTML and everything else: no aggressive caching (README §Deployment).
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Hide dotfiles (except .well-known/, which Angie's ACME uses on :80).
    location ~ /\.(?!well-known/) {
        deny all;
    }
}
